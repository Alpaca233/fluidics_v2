; PlatformIO Project Configuration File
;
; Fluidics Controller - Teensy 4.1
;

[platformio]
; Source files are in the project root (not src/)
src_dir = .

[env:teensy41]
platform = teensy
board = teensy41
framework = arduino

; Serial monitor
monitor_speed = 2000000

; Library dependencies
lib_deps =
    bakercp/PacketSerial@^1.4.0

; Build flags (optional - uncomment if needed)
; build_flags =
;     -D USB_SERIAL
;     -D TEENSY41

; Upload protocol (default is teensy-cli)
; upload_protocol = teensy-cli
